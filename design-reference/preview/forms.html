<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--paper); }
  .stack { display: flex; flex-direction: column; gap: 10px; max-width: 460px; }
  label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-2); display:block; margin-bottom: 4px; }
  input[type=text], input[type=email], textarea, select {
    font-family: var(--font-sans); font-size: 15px;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--ink); border-radius: 0;
    padding: 10px 12px; width: 100%;
  }
  input:focus, textarea:focus { outline: 0; box-shadow: 3px 3px 0 var(--redline); }
  .pill { display:inline-flex; align-items: center; gap: 8px; border: 1px solid var(--ink); border-radius: 999px; padding: 6px 12px; font-family: var(--font-mono); font-size: 12px; }
</style>
</head>
<body>
  <div class="stack">
    <div><label>your email</label><input type="email" placeholder="mail@thepit.com"></div>
    <div><label>a note</label><textarea rows="2" placeholder="tell us what you're working on"></textarea></div>
    <div class="pill">🔍 <input type="text" placeholder="search the catalog" style="border:0;padding:0;background:transparent"></div>
  </div>
</body>
</html>
