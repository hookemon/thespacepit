<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors — Chakra (Calllm)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; }
  .strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 12px; }
  .sw { aspect-ratio: 0.85; border: 1px solid var(--ink); padding: 8px; display:flex;flex-direction:column;justify-content:space-between; }
  .n { font-family: var(--font-mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; }
  .h { font-family: var(--font-mono); font-size: 10px; }
  .note { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-2); }
</style>
</head>
<body>
  <div class="strip">
    <div class="sw" style="background:#9B1B1B;color:#F4EFE6"><span class="n">root</span><span class="h">#9B1B1B</span></div>
    <div class="sw" style="background:#E2651A;color:#F4EFE6"><span class="n">sacral</span><span class="h">#E2651A</span></div>
    <div class="sw" style="background:#F2C84B;color:#0B0B0B"><span class="n">solar</span><span class="h">#F2C84B</span></div>
    <div class="sw" style="background:#3E8E5A;color:#F4EFE6"><span class="n">heart</span><span class="h">#3E8E5A</span></div>
    <div class="sw" style="background:#2F6FB3;color:#F4EFE6"><span class="n">throat</span><span class="h">#2F6FB3</span></div>
    <div class="sw" style="background:#4B2E83;color:#F4EFE6"><span class="n">third eye</span><span class="h">#4B2E83</span></div>
    <div class="sw" style="background:#E3D4F2;color:#0B0B0B"><span class="n">crown</span><span class="h">#E3D4F2</span></div>
  </div>
  <div class="note">7 chakras · 1 color per drone release · for the calllm ambient sub-label</div>
</body>
</html>
