<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Textures & Grain</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--paper); display:grid;grid-template-columns: 1fr 1fr;gap:12px; }
  .cell { border: 1px solid var(--ink); aspect-ratio: 2.2; display:flex;align-items:flex-end;padding:10px;position:relative;overflow:hidden; }
  .cell .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; background: var(--paper); padding: 2px 6px; border: 1px solid var(--ink); z-index:2; }
  .grain { background: var(--paper); }
  .grain::after { content:""; position:absolute; inset:0; opacity:.12; mix-blend-mode: multiply; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
  .halftone { background: var(--paper); background-image: radial-gradient(var(--ink) 1px, transparent 1.2px); background-size: 6px 6px; }
  .xerox { background: var(--paper); position:relative; }
  .xerox::after { content:""; position:absolute; inset:0; opacity:.25; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.03' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.04  0 0 0 0 0.04  0 0 0 0 0.04  0 0 0 2 -0.5'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
  .chakra { background: linear-gradient(120deg, #9B1B1B 0%, #E2651A 16%, #F2C84B 33%, #3E8E5A 50%, #2F6FB3 67%, #4B2E83 84%, #E3D4F2 100%); }
</style>
</head>
<body>
  <div class="cell grain"><span class="lbl">grain overlay · 4%</span></div>
  <div class="cell halftone"><span class="lbl">halftone · dot 6px</span></div>
  <div class="cell xerox"><span class="lbl">xerox noise · heavy</span></div>
  <div class="cell chakra"><span class="lbl">chakra gradient · calllm only</span></div>
</body>
</html>
