<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; }
  .row { border-bottom: 1px solid var(--ink); padding: 10px 0; }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-2); }
  .specimen { font-family: var(--font-display); text-transform: uppercase; letter-spacing: -0.015em; line-height: .92; font-weight:700; color: var(--ink); }
</style>
</head>
<body>
  <div class="row">
    <span class="tag">antonio · 700 · 64/.92</span>
    <div class="specimen" style="font-size:64px">PULL UP TO THESPACEPIT</div>
  </div>
  <div class="row">
    <span class="tag">antonio · 600 · 40/1.0</span>
    <div class="specimen" style="font-size:40px;font-weight:600">we out here 🌱</div>
  </div>
  <div class="row">
    <span class="tag">antonio · 500 · 28/1.08</span>
    <div class="specimen" style="font-size:28px;font-weight:500">grab some samples</div>
  </div>
</body>
</html>
