<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .box { width: 90px; height: 90px; background: var(--ink); position: relative; }
  .label { margin-top: 8px; font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; }
  .note { margin-top: 18px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); border-top: 1px solid var(--ink); padding-top: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div><div class="box" style="border-radius:0"></div><div class="label">r-0 · default</div></div>
    <div><div class="box" style="border-radius:999px;width:180px;height:40px"></div><div class="label">r-pill · chips only</div></div>
  </div>
  <div class="note">we use 0 or 999px. no 8/12/16 "tech" radii. sharp or fully round, nothing in between.</div>
</body>
</html>
